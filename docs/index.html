<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>👮 PMESP — 5ª Cia | Gerador de CPP do Turno</title>
    <meta name="description" content="Gerador de Cartão de Prioridade de Patrulhamento (CPP) para 5ª Cia PMESP">
    <meta name="theme-color" content="#0a2540">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a2540;
            --primary-light: #1a4d7a;
            --accent: #00d4ff;
            --accent-dark: #0099cc;
            --gold: #FFD700;
            --purple: #9b59b6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark-bg: #0f1419;
            --dark-card: #1a2332;
            --dark-border: #2a3a4f;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
            --border-radius: 1.2rem;
            --shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
            --shadow-lg: 0 20px 60px rgba(0, 212, 255, 0.15);
            --shadow-glow: 0 0 40px rgba(0, 212, 255, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Geist', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2f4a 100%);
            color: #e0e0e0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animações */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); }
            50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.6); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* HEADER */
        .header {
            background: rgba(10, 37, 64, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: white;
            padding: 2rem 1.5rem;
            margin-bottom: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-glow);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--gold) 0%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.8;
            position: relative;
            z-index: 1;
            color: var(--accent);
        }

        /* TELAS */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* FORMULÁRIO */
        .form-group {
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.6s ease-out;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--accent);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-family: inherit;
            background: rgba(26, 35, 50, 0.5);
            color: #e0e0e0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .form-group input::placeholder,
        .form-group select::placeholder,
        .form-group textarea::placeholder {
            color: rgba(224, 224, 224, 0.5);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.05);
            background: rgba(26, 35, 50, 0.8);
        }

        /* BOTÕES */
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            text-decoration: none;
            width: 100%;
            margin-bottom: 0.75rem;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(0, 212, 255, 0.2);
            transition: left 0.4s ease;
            z-index: -1;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, rgba(0, 153, 204, 0.1) 100%);
            color: var(--accent);
            border-color: var(--accent);
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3) 0%, rgba(0, 153, 204, 0.2) 100%);
        }

        .btn-primary:active {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(42, 58, 79, 0.5);
            color: #e0e0e0;
            border-color: rgba(0, 212, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(42, 58, 79, 0.8);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ff6b6b;
            border-color: #ff6b6b;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.3);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        .btn-success {
            background: rgba(16, 185, 129, 0.2);
            color: #4ade80;
            border-color: #4ade80;
        }

        .btn-success:hover {
            background: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            width: auto;
            margin: 0.25rem;
        }

        /* CARTÕES */
        .card {
            background: rgba(26, 35, 50, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-glow);
            border-color: rgba(0, 212, 255, 0.4);
            transform: translateY(-8px);
            background: rgba(26, 35, 50, 0.8);
        }

        .card:hover::before {
            left: 100%;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* BADGES */
        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            animation: slideInRight 0.6s ease-out;
        }

        .badge:hover {
            transform: scale(1.1);
        }

        .badge-prel {
            background: rgba(100, 116, 139, 0.3);
            color: #cbd5e1;
            border-color: rgba(100, 116, 139, 0.5);
        }

        .badge-post {
            background: rgba(37, 99, 235, 0.3);
            color: #60a5fa;
            border-color: rgba(37, 99, 235, 0.5);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.2);
        }

        .badge-prev {
            background: rgba(30, 64, 175, 0.3);
            color: #60a5fa;
            border-color: rgba(30, 64, 175, 0.5);
        }

        .badge-pe {
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.4), rgba(155, 89, 182, 0.1));
            color: #d8b4fe;
            border-color: rgba(155, 89, 182, 0.6);
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.2);
        }

        .badge-fisc {
            background: rgba(220, 38, 38, 0.3);
            color: #ff6b6b;
            border-color: rgba(220, 38, 38, 0.5);
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.2);
        }

        .badge-ref {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.4), rgba(255, 215, 0, 0.1));
            color: var(--gold);
            border-color: rgba(255, 215, 0, 0.6);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .badge-rel {
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.4), rgba(155, 89, 182, 0.1));
            color: #d8b4fe;
            border-color: rgba(155, 89, 182, 0.6);
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.2);
        }

        .badge-rural {
            background: rgba(34, 197, 94, 0.3);
            color: #4ade80;
            border-color: rgba(34, 197, 94, 0.5);
        }

        .badge-esc {
            background: rgba(168, 85, 247, 0.3);
            color: #d8b4fe;
            border-color: rgba(168, 85, 247, 0.5);
        }

        .badge-sat {
            background: rgba(236, 72, 153, 0.3);
            color: #f472b6;
            border-color: rgba(236, 72, 153, 0.5);
        }

        .badge-desl {
            background: rgba(0, 212, 255, 0.2);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        /* BLOCO HORÁRIO */
        .bloco {
            background: rgba(26, 35, 50, 0.5);
            border-left: 4px solid var(--accent);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1.5rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            animation: fadeInUp 0.6s ease-out;
        }

        .bloco:hover {
            background: rgba(26, 35, 50, 0.8);
            border-left-color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            transform: translateX(8px);
        }

        .bloco.concluido {
            opacity: 0.7;
            background: rgba(16, 185, 129, 0.1);
            border-left-color: #4ade80;
        }

        .bloco.concluido:hover {
            background: rgba(16, 185, 129, 0.15);
        }

        .bloco-content {
            flex: 1;
        }

        .bloco-header {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .bloco-hora {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.125rem;
            min-width: 100px;
        }

        .bloco-info {
            font-size: 0.875rem;
            color: var(--gray-500);
            margin-top: 0.5rem;
        }

        .bloco-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .checkbox-large {
            width: 44px;
            height: 44px;
            cursor: pointer;
            accent-color: var(--success);
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: var(--border-radius);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--gray-900);
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .modal-footer .btn {
            flex: 1;
            margin: 0;
        }

        /* PROGRESSO */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--gray-200);
            border-radius: 9999px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 0.875rem;
            color: var(--gray-500);
            text-align: center;
        }

        /* HISTÓRICO */
        .historico-item {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: var(--border-radius);
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .historico-info {
            flex: 1;
        }

        .historico-data {
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        /* UTILIDADES */
        .text-center {
            text-align: center;
        }

        .mt-2 {
            margin-top: 1rem;
        }

        .mb-2 {
            margin-bottom: 1rem;
        }

        .flex {
            display: flex;
        }

        .gap-1 {
            gap: 1rem;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .top-nav button {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        /* RESPONSIVO */
        @media (max-width: 640px) {
            .container {
                padding: 0.75rem;
            }

            .header {
                padding: 1rem 0.75rem;
            }

            .header h1 {
                font-size: 1.25rem;
            }

            .card {
                padding: 1rem;
            }

            .bloco {
                flex-direction: column;
            }

            .bloco-actions {
                justify-content: flex-start;
            }

            .modal {
                width: 95%;
                padding: 1.5rem;
            }
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--gray-500);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👮 PMESP — 5ª Cia</h1>
        <p>Gerador de CPP do Turno</p>
    </div>

    <div class="container">
        <!-- TELA 1: CONFIGURAÇÃO -->
        <div id="screen-config" class="screen active">
            <div class="top-nav">
                <h2 style="margin: 0;">Configuração do Serviço</h2>
                <button id="btn-historico" class="btn btn-secondary btn-sm" style="display:none;">📋 Histórico</button>
            </div>

            <div class="card">
                <form id="form-config">
                    <div class="form-group">
                        <label>Tipo de Atividade</label>
                        <select id="tipoAtividade" required>
                            <option value="Atividade Delegada">Atividade Delegada</option>
                            <option value="DEJEM">DEJEM</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Município</label>
                        <select id="municipio" required>
                            <option value="Valparaíso">Valparaíso</option>
                            <option value="Guararapes">Guararapes</option>
                            <option value="Rubiácea">Rubiácea</option>
                            <option value="Bento de Abreu">Bento de Abreu</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Tipo de Policiamento</label>
                        <select id="tipoPoliciamento" required>
                            <option value="Urbano">Urbano</option>
                            <option value="Rural">Rural</option>
                            <option value="Urbano+Rural">Urbano + Rural</option>
                        </select>
                    </div>

                    <div class="form-group" id="municipios-multiplos" style="display: none;">
                        <label>Selecione os Municípios (DEJEM)</label>
                        <div style="margin-top: 0.5rem;">
                            <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0.5rem;">
                                <input type="checkbox" name="municipios" value="Valparaíso" style="margin-right: 0.5rem;">
                                Valparaíso
                            </label>
                            <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0.5rem;">
                                <input type="checkbox" name="municipios" value="Guararapes" style="margin-right: 0.5rem;">
                                Guararapes
                            </label>
                            <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0.5rem;">
                                <input type="checkbox" name="municipios" value="Rubiácea" style="margin-right: 0.5rem;">
                                Rubiácea
                            </label>
                            <label style="display: flex; align-items: center; font-weight: 400;">
                                <input type="checkbox" name="municipios" value="Bento de Abreu" style="margin-right: 0.5rem;">
                                Bento de Abreu
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" id="data" required>
                    </div>

                    <div class="form-group">
                        <label>Hora de Início</label>
                        <input type="time" id="horaInicio" required>
                    </div>

                    <div class="form-group">
                        <label>Hora de Término (Duração: 8h)</label>
                        <input type="time" id="horaTermino" readonly>
                    </div>

                    <div class="form-group">
                        <label>Modalidade de Geração</label>
                        <div style="margin-top: 0.5rem;">
                            <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0.5rem;">
                                <input type="radio" name="modalidade" value="automatica" checked style="margin-right: 0.5rem;">
                                Gerar CPP automático
                            </label>
                            <label style="display: flex; align-items: center; font-weight: 400;">
                                <input type="radio" name="modalidade" value="manual" style="margin-right: 0.5rem;">
                                Vou detalhar e o app completa
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Efetivo (opcional)</label>
                        <input type="text" id="efetivo" placeholder="Ex: 4 PMs">
                    </div>

                    <div class="form-group">
                        <label>Viatura (opcional)</label>
                        <input type="text" id="viatura" placeholder="Ex: Viatura 1">
                    </div>

                    <div class="form-group">
                        <label>Prefixo (opcional)</label>
                        <input type="text" id="prefixo" placeholder="Ex: 5-01">
                    </div>

                    <button type="submit" class="btn btn-primary">Gerar CPP do Turno</button>
                </form>
            </div>
        </div>

        <!-- TELA 2: CPP DO TURNO -->
        <div id="screen-cpp" class="screen">
            <div class="top-nav">
                <h2 style="margin: 0;" id="cpp-titulo">CPP do Turno</h2>
                <button id="btn-voltar-cpp" class="btn btn-secondary btn-sm">← Voltar</button>
            </div>

            <div class="card">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill" style="width: 0%;"></div>
                </div>
                <div id="progress-text" class="progress-text">0 de 0 blocos concluídos</div>
            </div>

            <div id="blocos-container"></div>

            <div class="card">
                <button id="btn-adicionar-bloco" class="btn btn-secondary">+ Adicionar Bloco</button>
                <button id="btn-recalcular" class="btn btn-secondary">🔄 Recalcular CPP</button>
                <button id="btn-exportar" class="btn btn-primary">📤 Exportar Relatório</button>
                <button id="btn-salvar-historico" class="btn btn-success">💾 Salvar no Histórico</button>
            </div>
        </div>

        <!-- TELA 3: HISTÓRICO -->
        <div id="screen-historico" class="screen">
            <div class="top-nav">
                <h2 style="margin: 0;">Histórico de Roteiros</h2>
                <button id="btn-voltar-historico" class="btn btn-secondary btn-sm">← Voltar</button>
            </div>

            <div class="card">

            <form id="form-editar-bloco">

            <label style="display: flex; align-items: center; margin-bottom: 1rem;">

                Exportar apenas blocos concluídos
            </label>
            <textarea id="export-texto" rows="10" readonly style="width: 100%; padding: 0.75rem; border: 1px solid var(--gray-300); border-radius: var(--border-radius); font-family: monospace; font-size: 0.875rem;"></textarea>
            <div class="modal-footer" style="margin-top: 1rem;">

                <button type="button" class="btn btn-secondary" onclick="document.getElementById('modal-exportar').classList.remove('active')">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // DADOS E CONSTANTES
        // ============================================================================

        const MUNICIPIOS = {
            "Valparaíso": {
                perfil: "urbano_medio",
                comercio: ["Centro", "Área comercial central"],
                bairros: ["Jardim Primavera", "Jardim Flamboyant", "Jardim Morumbi"],
                pontosPE: ["Entrada norte", "Entrada sul", "Praça central"],
                pontosFisc: ["Saída SP-300", "Acessos principais", "Rodovia Marechal Rondon"],
                acessos: ["Saída SP-300", "Acessos principais", "Rodovia Marechal Rondon", "Entrada norte"],
                rural: ["Zona rural norte", "Zona rural sul"]
            },
            "Guararapes": {
                perfil: "urbano_pequeno",
                comercio: ["Centro", "Comércio local"],
                bairros: ["Centro", "Bairro novo", "Zona residencial"],
                pontosPE: ["Praça central", "Entrada da cidade"],
                pontosFisc: ["Saída norte", "Saída sul"],
                acessos: ["Saída norte", "Saída sul"],
                rural: ["Zona rural"]
            },
            "Rubiácea": {
                perfil: "rural_pequeno",
                comercio: ["Centro"],
                bairros: ["Centro", "Zona residencial"],
                pontosPE: ["Entrada da cidade"],
                pontosFisc: ["Saída principal"],
                acessos: ["Saída principal"],
                rural: ["Zona rural norte", "Zona rural sul", "Propriedades rurais"]
            },
            "Bento de Abreu": {
                perfil: "rural_pequeno",
                comercio: ["Centro"],
                bairros: ["Centro"],
                pontosPE: ["Entrada"],
                pontosFisc: ["Saída"],
                acessos: ["Saída"],
                rural: ["Zona rural", "Propriedades"]
            }
        };

        const MODALIDADES = {
            "PREL": { nome: "Preleção", badge: "badge-prel", duracao: [30, 30] },
            "PATRULHA": { nome: "Patrulhamento", badge: "badge-post", duracao: [30, 30] },
            "RONDA": { nome: "Ronda", badge: "badge-prev", duracao: [30, 30] },
            "PE": { nome: "Ponto de Estacionamento", badge: "badge-pe", duracao: [30, 30] },
            "PE_ESCOLA": { nome: "PE em Escola", badge: "badge-pe", duracao: [30, 30] },
            "PE_COMERCIO": { nome: "PE em Comércio", badge: "badge-pe", duracao: [30, 30] },
            "PE_PRACA": { nome: "PE na Praça", badge: "badge-pe", duracao: [30, 30] },
            "FISC": { nome: "Fiscalização", badge: "badge-fisc", duracao: [30, 30] },
            "BLOQUEIO_TRANSITO": { nome: "Bloqueio Trânsito", badge: "badge-fisc", duracao: [30, 30] },
            "BLOQUEIO": { nome: "Bloqueio", badge: "badge-fisc", duracao: [30, 30] },
            "SATURACAO": { nome: "Saturação", badge: "badge-sat", duracao: [30, 30] },
            "ESCOLTA": { nome: "Escolta", badge: "badge-desl", duracao: [30, 30] },
            "RURAL": { nome: "Patrulhamento Rural", badge: "badge-rural", duracao: [30, 30] },
            "ESC": { nome: "Ronda Escolar", badge: "badge-esc", duracao: [30, 30] },
            "REF": { nome: "Refeição", badge: "badge-ref", duracao: [60, 60] },
            "REL": { nome: "Relatório", badge: "badge-rel", duracao: [30, 30] }
        };

        const JUSTIFICATIVAS = {
            "PREL": "Preleção e assunção do serviço pela base do pelotão.",
            "PATRULHA": "Patrulhamento móvel em área de cobertura.",
            "RONDA": "Ronda preventiva em bairros residenciais.",
            "PE": "Ponto de estacionamento para dissuasão.",
            "FISC": "Fiscalização de veículos em acessos.",
            "BLOQUEIO": "Bloqueio de acesso para controle de fluxo.",
            "SATURACAO": "Saturação em área de alto risco.",
            "ESCOLTA": "Escolta de evento ou autoridade.",
            "RURAL": "Patrulhamento em zona rural.",
            "ESC": "Ronda escolar para proteção.",
            "REF": "Alimentação pela base do pelotão.",
            "REL": "Elaboração do Relatório de Serviço Operacional (RSO)."
        };

        const MODUS_OPERANDI_DEFAULT = "Patrulhamento, Abordagem, Vigilância";

        // ============================================================================
        // MOTOR DE GERAÇÃO DE CPP
        // ============================================================================

        function calcularPeriodo(hora) {
            if (hora >= 6 && hora < 12) return "manha";
            if (hora >= 12 && hora < 18) return "tarde";
            if (hora >= 18 && hora < 24) return "noite";
            return "madrugada";
        }

        function ehDiaUtil(data) {
            const date = new Date(data);
            const diaSemana = date.getDay();
            return diaSemana !== 0 && diaSemana !== 6;
        }

        function gerarCPP(config) {
            const blocos = [];
            const horaInicioMin = horaParaMinutos(config.horaInicio);
            const horaFimMin = horaParaMinutos(config.horaTermino);
            let duracao = horaFimMin - horaInicioMin;
            
            if (duracao <= 0) {
                duracao = (24 * 60) + duracao;
            }
            
            const municipio = MUNICIPIOS[config.municipio];
            const diaUtil = ehDiaUtil(config.data);
            
            let tempoAtual = horaInicioMin;
            let ordem = 0;
            let refeicaoInserida = false;
            let modalidadeAnterior = null;
            let indiceBairro = 0;
            
            const duracao8h = 8 * 60;
            const tempoRefeicaoMin = horaInicioMin + Math.floor(duracao8h * 0.4);
            const tempoRefeicaoMax = horaInicioMin + Math.floor(duracao8h * 0.6);
            const tempoREL = horaInicioMin + duracao8h - 30;
            
            // 1. PRELEÇÃO (sempre primeiro, 30 min)
            blocos.push(criarBloco(
                ordem++,
                tempoAtual,
                30,
                "PREL",
                "Base do Pelotão PM",
                "Assunção do serviço"
            ));
            tempoAtual += 30;
            modalidadeAnterior = "PREL";
            
            // 2. DESLOCAMENTO (se necessário, 20 min)
            if (config.municipio !== "Valparaíso") {
                blocos.push(criarBloco(
                    ordem++,
                    tempoAtual,
                    20,
                    "DESL",
                    `Deslocamento para ${config.municipio}`,
                    "Deslocamento ao setor"
                ));
                tempoAtual += 20;
                modalidadeAnterior = "DESL";
            }
            
            // 3. Preencher o miolo com alternância de móvel e fixo
            while (tempoAtual < tempoREL) {
                // Inserir refeição no terço médio (60 min)
                if (
                    !refeicaoInserida &&
                    tempoAtual >= tempoRefeicaoMin &&
                    tempoAtual < tempoRefeicaoMax &&
                    tempoREL - tempoAtual > 90
                ) {
                    blocos.push(criarBloco(
                        ordem++,
                        tempoAtual,
                        60,
                        "REF",
                        "Base do Pelotão PM",
                        "Refeição"
                    ));
                    tempoAtual += 60;
                    refeicaoInserida = true;
                    modalidadeAnterior = "REF";
                    continue;
                }
                
                // Verificar se há tempo suficiente
                if (tempoREL - tempoAtual <= 30) break;
                
                // Calcular hora atual para determinar período
                const horaAtual = Math.floor((tempoAtual % (24 * 60)) / 60);
                const periodo = calcularPeriodo(horaAtual);
                
                // Selecionar próxima modalidade
                const contadorBlocos = blocos.map(b => b.modalidade);
                const modalidade = selecionarProximaModalidade(
                    config,
                    municipio,
                    periodo,
                    modalidadeAnterior,
                    diaUtil,
                    contadorBlocos
                );
                
                // BLOCOS DE 30 MINUTOS SEMPRE
                const tempoDisponivel = tempoREL - tempoAtual;
                const duracaoBloco = 30; // SEMPRE 30 minutos
                
                if (tempoDisponivel < 30) break;
                
                // Selecionar local
                const local = selecionarLocal(
                    config,
                    municipio,
                    modalidade,
                    indiceBairro++
                );
                
                // Selecionar problema
                const problema = selecionarProblema(modalidade, periodo, local);
                
                blocos.push(criarBloco(
                    ordem++,
                    tempoAtual,
                    duracaoBloco,
                    modalidade,
                    local,
                    problema
                ));
                
                tempoAtual += duracaoBloco;
                modalidadeAnterior = modalidade;
            }
            
            // 4. RELATÓRIO (sempre último, 30 min)
            blocos.push(criarBloco(
                ordem++,
                tempoREL,
                30,
                "REL",
                "Base do Pelotão PM",
                "Elaboração do RSO"
            ));
            
            return blocos;
        }

        function selecionarProximaModalidade(configuracao, municipio, periodo, modalidadeAnterior, diaUtil, contadorBlocos) {
            // Contadores para controlar repetição
            const peCount = contadorBlocos.filter(m => m === "PE").length;
            const bloqueioCount = contadorBlocos.filter(m => m === "BLOQUEIO").length;
            const rondasCount = contadorBlocos.filter(m => m === "RONDA").length;
            
            // Regra 1: Máximo 2 PEs consecutivos
            if (peCount >= 2 && modalidadeAnterior === "PE") {
                // Forçar móvel
                return periodo === "noite" ? "FISC" : "PATRULHA";
            }
            
            // Regra 2: Máximo 2 BLOQUEIOs por turno
            if (bloqueioCount >= 2) {
                // Não inserir mais bloqueios
            } else if (periodo === "noite" && Math.random() > 0.6) {
                return "BLOQUEIO"; // 40% de chance à noite
            }
            
            // Regra 3: Alternar móvel/fixo a cada 30 min
            const ehMovel = ["PE", "BLOQUEIO", "FISC"].includes(modalidadeAnterior);
            
            if (ehMovel) {
                // Selecionar modalidade móvel
                const modalidadesMoveis = [];
                
                if (configuracao.tipoPoliciamento === "Rural") {
                    modalidadesMoveis.push("PATRULHA", "RONDA");
                } else {
                    if (periodo === "manha" || periodo === "tarde") {
                        modalidadesMoveis.push("PATRULHA", "RONDA", "SATURACAO");
                    } else {
                        modalidadesMoveis.push("PATRULHA", "RONDA");
                    }
                    
                    // Escolta em horários de evento
                    if ((periodo === "tarde" || periodo === "noite") && Math.random() > 0.8) {
                        modalidadesMoveis.push("ESCOLTA");
                    }
                }
                
                return modalidadesMoveis[Math.floor(Math.random() * modalidadesMoveis.length)];
            } else {
                // Selecionar modalidade fixa
                if (periodo === "noite" || periodo === "madrugada") {
                    return Math.random() > 0.5 ? "FISC" : "PE";
                }
                return "PE";
            }
        }

        function selecionarLocal(configuracao, municipio, modalidade, indice) {
            switch (modalidade) {
                case "PATRULHA":
                    return municipio.comercio[indice % municipio.comercio.length];
                case "RONDA":
                    return municipio.bairros[indice % municipio.bairros.length];
                case "PE":
                    return municipio.pontosPE[indice % municipio.pontosPE.length];
                case "FISC":
                    return municipio.pontosFisc[indice % municipio.pontosFisc.length];
                case "BLOQUEIO":
                    return `Bloqueio — ${municipio.acessos[indice % municipio.acessos.length]}`;
                case "SATURACAO":
                    return municipio.comercio[indice % municipio.comercio.length];
                case "ESCOLTA":
                    return `Escolta — ${municipio.bairros[indice % municipio.bairros.length]}`;
                case "RURAL":
                    return municipio.rural[indice % municipio.rural.length];
                case "ESC":
                    return `Entorno de escola — ${municipio.bairros[indice % municipio.bairros.length]}`;
                default:
                    return "Base do Pelotão PM";
            }
        }

        function selecionarProblema(modalidade, periodo, local) {
            switch (modalidade) {
                case "PATRULHA":
                    return "Roubo/furto a comércio; presença ostensiva";
                case "RONDA":
                    if (periodo === "noite" || periodo === "madrugada") {
                        return "Furto/roubo a residência; vigilância preventiva";
                    }
                    return "Prevenção de delitos em bairros";
                case "PE":
                    return "Sensação de segurança; dissuasão de delitos no entorno";
                case "FISC":
                    return "Furto/roubo de veículo; infrações de trânsito; controle de acessos";
                case "BLOQUEIO":
                    return "Controle de acesso; prevenção de fuga de autores; fiscalização de trânsito";
                case "SATURACAO":
                    return "Prevenção em evento/data de relevância; presença massiva";
                case "ESCOLTA":
                    return "Proteção de evento; segurança de autoridades";
                case "ESC":
                    return "Proteção do entorno escolar; uso/tráfico de drogas";
                case "RURAL":
                    return "Furto em propriedade rural; vigilância de acessos";
                default:
                    return "Atividade de policiamento";
            }
        }

        function selecionarAcoesPolicia(modalidade) {
            switch (modalidade) {
                case "PATRULHA":
                    return "Patrulhamento, Abordagem, Vigilância";
                case "RONDA":
                    return "Ronda, Abordagem, Orientação";
                case "PE":
                    return "Permanência, Abordagem, Vigilância";
                case "FISC":
                    return "Abordagem, Fiscalização de trânsito, Revista";
                case "BLOQUEIO":
                    return "Bloqueio, Fiscalização, Abordagem";
                case "SATURACAO":
                    return "Saturação, Abordagem massiva, Revista";
                case "ESCOLTA":
                    return "Escolta, Proteção, Vigilância";
                case "ESC":
                    return "Patrulhamento, Orientação, Proteção";
                case "RURAL":
                    return "Patrulhamento, Abordagem, Ronda em propriedades";
                default:
                    return "Patrulhamento";
            }
        }

        function criarBloco(ordem, horaInicioMin, duracao, modalidade, local, problema) {
            return {
                id: `bloco-${Date.now()}-${Math.random()}`,
                horaInicio: minutosParaHora(horaInicioMin),
                horaFim: minutosParaHora(horaInicioMin + duracao),
                modalidade,
                local,
                problemaSolucionar: problema,
                modusOperandi: MODUS_OPERANDI_DEFAULT,
                acoesPolicia: selecionarAcoesPolicia(modalidade),
                justificativa: JUSTIFICATIVAS[modalidade] || "Atividade de policiamento conforme NORSOP",
                observacao: "",
                concluido: false,
                ordem
            };
        }

        function horaParaMinutos(hora) {
            const [h, m] = hora.split(":").map(Number);
            return h * 60 + m;
        }

        function minutosParaHora(minutos) {
            let h = Math.floor(minutos / 60);
            const m = minutos % 60;
            if (h >= 24) h -= 24;
            return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
        }

        // ============================================================================
        // LOCALSTORAGE
        // ============================================================================

        function salvarRoteiro(roteiro) {
            localStorage.setItem("roteiro_atual", JSON.stringify(roteiro));
        }

        function carregarRoteiro() {
            const dados = localStorage.getItem("roteiro_atual");
            return dados ? JSON.parse(dados) : null;
        }

        function salvarHistorico(historico) {
            localStorage.setItem("historico_roteiros", JSON.stringify(historico));
        }

        function carregarHistorico() {
            const dados = localStorage.getItem("historico_roteiros");
            return dados ? JSON.parse(dados) : [];
        }

        // ============================================================================
        // ESTADO GLOBAL
        // ============================================================================

        // Limpar localStorage para forçar regeneração com novo motor
        localStorage.removeItem('roteiro_atual');
        
        let estadoApp = {
            telaAtual: "config",
            roteiroDia: carregarRoteiro(),
            historico: carregarHistorico(),
            blocoEmEdicao: null
        };

        // ============================================================================
        // NAVEGAÇÃO ENTRE TELAS
        // ============================================================================

        function mostrarTela(tela) {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            document.getElementById(`screen-${tela}`).classList.add("active");
            estadoApp.telaAtual = tela;

            if (tela === "config") {
                atualizarBotaoHistorico();
            }
        }

        function atualizarBotaoHistorico() {
            const btn = document.getElementById("btn-historico");
            if (estadoApp.historico.length > 0) {
                btn.style.display = "block";
                btn.textContent = `📋 Histórico (${estadoApp.historico.length})`;
            } else {
                btn.style.display = "none";
            }
        }

        // ============================================================================
        // TELA 1: CONFIGURAÇÃO
        // ============================================================================

        document.getElementById("horaInicio").addEventListener("change", function() {
            const horaInicio = this.value;
            const [h, m] = horaInicio.split(":").map(Number);
            let horaFim = h + 8;
            let minutoFim = m;
            if (horaFim >= 24) horaFim -= 24;
            document.getElementById("horaTermino").value = `${String(horaFim).padStart(2, "0")}:${String(minutoFim).padStart(2, "0")}`;
        });

        // Definir data de hoje
        document.getElementById("data").valueAsDate = new Date();

        // Mostrar/esconder checkboxes de múltiplos municípios quando DEJEM
        document.getElementById('tipoAtividade').addEventListener('change', function() {
            const municipiosMultiplos = document.getElementById('municipios-multiplos');
            if (this.value === 'DEJEM') {
                municipiosMultiplos.style.display = 'block';
            } else {
                municipiosMultiplos.style.display = 'none';
            }
        });

        document.getElementById("form-config").addEventListener("submit", function(e) {
            e.preventDefault();

            const config = {
                tipoAtividade: document.getElementById("tipoAtividade").value,
                municipio: document.getElementById("municipio").value,
                tipoPoliciamento: document.getElementById("tipoPoliciamento").value,
                data: document.getElementById("data").value,
                horaInicio: document.getElementById("horaInicio").value,
                horaTermino: document.getElementById("horaTermino").value,
                efetivo: document.getElementById("efetivo").value,
                viatura: document.getElementById("viatura").value,
                prefixo: document.getElementById("prefixo").value
            };

            const blocos = gerarCPP(config);
            estadoApp.roteiroDia = {
                id: `roteiro-${Date.now()}`,
                config,
                blocos,
                dataCriacao: new Date().toISOString()
            };

            salvarRoteiro(estadoApp.roteiroDia);
            renderizarCPP();
            mostrarTela("cpp");
        });

        document.getElementById("btn-historico").addEventListener("click", function() {
            mostrarTela("historico");
        });

        // ============================================================================
        // TELA 2: CPP DO TURNO
        // ============================================================================

        function renderizarCPP() {
            if (!estadoApp.roteiroDia) return;

            const { config, blocos } = estadoApp.roteiroDia;
            const concluidos = blocos.filter(b => b.concluido).length;
            const percentual = Math.round((concluidos / blocos.length) * 100);

            document.getElementById("cpp-titulo").textContent = `CPP - ${config.municipio} (${config.horaInicio} às ${config.horaTermino})`;
            document.getElementById("progress-fill").style.width = `${percentual}%`;
            document.getElementById("progress-text").textContent = `${concluidos} de ${blocos.length} blocos concluídos (${percentual}%)`;

            const container = document.getElementById("blocos-container");
            container.innerHTML = "";

            blocos.forEach((bloco, idx) => {
                const div = document.createElement("div");
                div.className = `bloco ${bloco.concluido ? "concluido" : ""}`;
                div.innerHTML = `
                    <div class="bloco-content">
                        <div class="bloco-header">
                            <div class="bloco-hora" style="color: #00d4ff; font-weight: 700; font-size: 1.1rem;">${bloco.horaInicio} - ${bloco.horaFim}</div>
                            <span class="badge ${MODALIDADES[bloco.modalidade].badge}">${bloco.modalidade}</span>
                        </div>
                        <div><strong>${bloco.local}</strong></div>
                        <div class="bloco-info">${bloco.problemaSolucionar}</div>
                        <div class="bloco-info">${bloco.acoesPolicia}</div>
                    </div>
                    <div class="bloco-actions">
                        <input type="checkbox" class="checkbox-large" ${bloco.concluido ? "checked" : ""} onchange="toggleBloco(${idx})">
                        <button class="btn btn-secondary btn-sm" onclick="editarBloco(${idx})">✏️ Editar</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function toggleBloco(idx) {
            estadoApp.roteiroDia.blocos[idx].concluido = !estadoApp.roteiroDia.blocos[idx].concluido;
            salvarRoteiro(estadoApp.roteiroDia);
            renderizarCPP();
        }

        function editarBloco(idx) {
            const bloco = estadoApp.roteiroDia.blocos[idx];
            estadoApp.blocoEmEdicao = idx;

            document.getElementById("edit-horaInicio").value = bloco.horaInicio;
            document.getElementById("edit-horaFim").value = bloco.horaFim;
            document.getElementById("edit-local").value = bloco.local;
            document.getElementById("edit-problema").value = bloco.problemaSolucionar;
            document.getElementById("edit-acoes").value = bloco.acoesPolicia;
            document.getElementById("edit-observacao").value = bloco.observacao;

            document.getElementById("modal-editar").classList.add("active");
        }

        document.getElementById("form-editar-bloco").addEventListener("submit", function(e) {
            e.preventDefault();
            const idx = estadoApp.blocoEmEdicao;
            const bloco = estadoApp.roteiroDia.blocos[idx];

            bloco.horaInicio = document.getElementById("edit-horaInicio").value;
            bloco.horaFim = document.getElementById("edit-horaFim").value;
            bloco.local = document.getElementById("edit-local").value;
            bloco.problemaSolucionar = document.getElementById("edit-problema").value;
            bloco.acoesPolicia = document.getElementById("edit-acoes").value;
            bloco.observacao = document.getElementById("edit-observacao").value;

            salvarRoteiro(estadoApp.roteiroDia);
            renderizarCPP();
            document.getElementById("modal-editar").classList.remove("active");
        });

        document.getElementById("btn-voltar-cpp").addEventListener("click", function() {
            if (confirm("Deseja salvar este roteiro no histórico antes de voltar?")) {
                estadoApp.historico.unshift({
                    ...estadoApp.roteiroDia,
                    dataSalvamento: new Date().toISOString()
                });
                salvarHistorico(estadoApp.historico);
                estadoApp.roteiroDia = null;
                salvarRoteiro(null);
            }
            mostrarTela("config");
        });

        document.getElementById("btn-exportar").addEventListener("click", function() {
            const blocos = estadoApp.roteiroDia.blocos;
            let texto = "";

            blocos.forEach(bloco => {
                if (document.getElementById("export-apenas-concluidos").checked && !bloco.concluido) return;
                texto += `*DAS ${bloco.horaInicio}H ÀS ${bloco.horaFim}H ${bloco.local.toUpperCase()}.\n`;
            });

            document.getElementById("export-texto").value = texto;
            document.getElementById("modal-exportar").classList.add("active");
        });

        document.getElementById("btn-copiar-relatorio").addEventListener("click", function() {
            const texto = document.getElementById("export-texto").value;
            navigator.clipboard.writeText(texto).then(() => {
                alert("Relatório copiado!");
            });
        });

        document.getElementById("btn-recalcular").addEventListener("click", function() {
            const blocos = gerarCPP(estadoApp.roteiroDia.config);
            estadoApp.roteiroDia.blocos = blocos.map(b => ({...b, concluido: false}));
            salvarRoteiro(estadoApp.roteiroDia);
            renderizarCPP();
        });

        document.getElementById("btn-salvar-historico").addEventListener("click", function() {
            estadoApp.historico.unshift({
                ...estadoApp.roteiroDia,
                dataSalvamento: new Date().toISOString()
            });
            salvarHistorico(estadoApp.historico);
            estadoApp.roteiroDia = null;
            salvarRoteiro(null);
            alert("Roteiro salvo no histórico!");
            mostrarTela("config");
        });

        document.getElementById("btn-adicionar-bloco").addEventListener("click", function() {
            const novoBloco = criarBloco(
                estadoApp.roteiroDia.blocos.length,
                horaParaMinutos("14:00"),
                90,
                "POST",
                "Local customizado",
                "Patrulhamento"
            );
            estadoApp.roteiroDia.blocos.push(novoBloco);
            salvarRoteiro(estadoApp.roteiroDia);
            renderizarCPP();
        });

        // ============================================================================
        // TELA 3: HISTÓRICO
        // ============================================================================

        function renderizarHistorico() {
            const container = document.getElementById("historico-container");
            container.innerHTML = "";

            if (estadoApp.historico.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Nenhum roteiro no histórico</p></div>';
                return;
            }

            estadoApp.historico.forEach((roteiro, idx) => {
                const data = new Date(roteiro.dataSalvamento).toLocaleDateString("pt-BR");
                const div = document.createElement("div");
                div.className = "historico-item";
                div.innerHTML = `
                    <div class="historico-info">
                        <div><strong>${roteiro.config.municipio}</strong> - ${roteiro.config.horaInicio} às ${roteiro.config.horaTermino}</div>
                        <div class="historico-data">${data}</div>
                    </div>
                    <div class="bloco-actions">
                        <button class="btn btn-secondary btn-sm" onclick="reabrirRoteiro(${idx})">Reabrir</button>
                        <button class="btn btn-secondary btn-sm" onclick="duplicarRoteiro(${idx})">Duplicar</button>
                        <button class="btn btn-danger btn-sm" onclick="excluirRoteiro(${idx})">Excluir</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function reabrirRoteiro(idx) {
            estadoApp.roteiroDia = {
                ...estadoApp.historico[idx],
                blocos: estadoApp.historico[idx].blocos.map(b => ({...b, concluido: false}))
            };
            salvarRoteiro(estadoApp.roteiroDia);
            renderizarCPP();
            mostrarTela("cpp");
        }

        function duplicarRoteiro(idx) {
            const roteiro = estadoApp.historico[idx];
            estadoApp.roteiroDia = {
                id: `roteiro-${Date.now()}`,
                config: roteiro.config,
                blocos: roteiro.blocos.map(b => ({...b, concluido: false})),
                dataCriacao: new Date().toISOString()
            };
            salvarRoteiro(estadoApp.roteiroDia);
            renderizarCPP();
            mostrarTela("cpp");
        }

        function excluirRoteiro(idx) {
            if (confirm("Tem certeza que deseja excluir este roteiro?")) {
                estadoApp.historico.splice(idx, 1);
                salvarHistorico(estadoApp.historico);
                renderizarHistorico();
            }
        }

        document.getElementById("btn-exportar-backup").addEventListener("click", function() {
            const dados = JSON.stringify(estadoApp.historico, null, 2);
            const blob = new Blob([dados], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `backup-roteiros-${new Date().toISOString().split("T")[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById("btn-importar-backup").addEventListener("click", function() {
            document.getElementById("file-import").click();
        });

        document.getElementById("file-import").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const dados = JSON.parse(event.target.result);
                    estadoApp.historico = [...dados, ...estadoApp.historico];
                    salvarHistorico(estadoApp.historico);
                    renderizarHistorico();
                    alert("Backup importado com sucesso!");
                } catch (err) {
                    alert("Erro ao importar backup: " + err.message);
                }
            };
            reader.readAsText(file);
        });

        document.getElementById("btn-voltar-historico").addEventListener("click", function() {
            mostrarTela("config");
        });

        // ============================================================================
        // INICIALIZAÇÃO
        // ============================================================================

        window.addEventListener("load", function() {
            atualizarBotaoHistorico();
            if (estadoApp.roteiroDia) {
                renderizarCPP();
                mostrarTela("cpp");
            }
        });

        // Expor funções globais
        window.toggleBloco = toggleBloco;
        window.editarBloco = editarBloco;
        window.reabrirRoteiro = reabrirRoteiro;
        window.duplicarRoteiro = duplicarRoteiro;
        window.excluirRoteiro = excluirRoteiro;
    </script>
</body>
</html>
